<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABB Confirmation Generator</title>
<link rel="icon" type="image/png" href="../assets/favicon-32x32.png" />
<script src="../assets/theme.js"></script>
<style>
  :root { --blue: #1F4E79; --light: #eef3f8; --bg: #f4f6f8; --panel: #fff; --ink: #222; --muted: #6d7f90; --line: #e7edf2; }
  :root[data-theme="dark"] { --light: #172231; --bg: #101418; --panel: #171d23; --ink: #e8edf2; --muted: #a8b4c2; --line: #344150; }
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: var(--bg); color: var(--ink); }
  header { background: var(--blue); color: #fff; padding: 18px 24px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 13px; opacity: .85; }
  .theme-control { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,.45); padding: 8px 10px; color: #fff; user-select: none; }
  .theme-control input { width: 16px; height: 16px; }
  main { max-width: 860px; margin: 24px auto; padding: 0 16px; }
  #drop {
    border: 2px dashed #9db6cc; border-radius: 10px; background: var(--panel);
    padding: 42px 20px; text-align: center; cursor: pointer;
    transition: background .15s, border-color .15s; font-size: 15px; color: #46617c;
  }
  #drop.hover { background: var(--light); border-color: var(--blue); }
  #drop b { color: var(--blue); }
  #drop small { display: block; margin-top: 8px; color: #8aa0b5; }
  #fileInput { display: none; }
  .row-btns { margin: 14px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    background: var(--blue); color: #fff; border: 0; border-radius: 6px;
    padding: 10px 18px; font-size: 14px; cursor: pointer;
  }
  button.secondary { background: #64788c; }
  button:disabled { background: #b6c2cd; cursor: default; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden;
          box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  th, td { text-align: left; padding: 10px 12px; font-size: 13.5px; border-bottom: 1px solid var(--line); }
  th { background: var(--light); color: #33506b; font-weight: 600; }
  td.status-ok { color: #1e7d38; font-weight: 600; }
  td.status-err { color: #b3261e; font-weight: 600; }
  td.status-wait { color: #8a9aa8; }
  td .dl { background: #2c7a44; padding: 6px 12px; font-size: 12.5px; }
  .note { font-size: 12.5px; color: var(--muted); margin-top: 14px; line-height: 1.5; }
  #rows .empty td { color: #9aabb9; font-style: italic; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <div>
      <h1>ABB Confirmation Generator</h1>
      <p>ABB purchase-order PDF</p>
    </div>
    <label class="theme-control">
      <input type="checkbox" data-theme-toggle />
      <span>Dark</span>
    </label>
  </div>
</header>
<main>
  <div id="drop">
    <b>Select purchase-order PDF</b>
  </div>
  <input type="file" id="fileInput" accept="application/pdf,.pdf" multiple>

  <div class="row-btns">
    <button id="btnAll" disabled>Download all</button>
    <button id="btnClear" class="secondary" disabled>Clear list</button>
  </div>

  <div id="tableWrap">
    <table>
      <thead><tr><th>Source file</th><th>Status</th><th>Result</th></tr></thead>
      <tbody id="rows">
        <tr class="empty"><td colspan="3">No files yet &mdash; finished PDFs will appear here.</td></tr>
      </tbody>
    </table>
  </div>
</main>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

  /^тел/, /^уеб страница/, /^имейл/, /^КРЗ/, /BIC:/, /^ЕАЗ ООД$/,
  /^ул\. Трети март/, /^4225 Перущица/, /^Номер на поръчка/, /^Дата на поръчката/,
  /следваща страница/, /^Фактури:/, /^ВАЖНО/,
];
const ADDR_STOP_RE = /^(Дата на|Условия|Incoterms|Фактури|Съгласно|Ваш)/;

const isJunk = (s) => JUNK_PATTERNS.some((p) => p.test(s));

/* Build text lines (with word coordinates) from a pdf.js page. */
async function pageLines(page, xMaxFraction) {
  const tc = await page.getTextContent();
  const vp = page.getViewport({ scale: 1 });
  const xMax = xMaxFraction ? vp.width * xMaxFraction : Infinity;
  const words = [];
  for (const it of tc.items) {
    const t = (it.str || "").trim();
    if (!t) continue;
    const x = it.transform[4], y = it.transform[5];
    if (x > xMax) continue;
    words.push({ x, y, text: t });
  }
  // cluster into lines by y (tolerance 3pt covers slight baseline offsets)
  words.sort((a, b) => b.y - a.y || a.x - b.x);
  const lines = [];
  for (const w of words) {
    const ln = lines.length ? lines[lines.length - 1] : null;
    if (ln && Math.abs(ln.y - w.y) <= 3) {
      ln.words.push(w);
      ln.y = (ln.y * (ln.words.length - 1) + w.y) / ln.words.length;
    } else {
      lines.push({ y: w.y, words: [w] });
    }
  }
  for (const ln of lines) {
    ln.words.sort((a, b) => a.x - b.x);
    ln.text = ln.words.map((w) => w.text).join(" ").replace(/\s+/g, " ").trim();
  }
  return { lines, height: vp.height, width: vp.width };
}

function extractAddress(lines, i) {
  const out = [];
  let j = i + 1;
  while (j < lines.length && out.length < 6) {
    const ln = lines[j].trim();
    if (/^-+$/.test(ln)) { j++; continue; } // stray column-separator dashes
    if (!ln || ITEM_START_RE.test(ln) || TOTAL_RE.test(ln) || isJunk(ln) ||
        ln.endsWith(":") || ADDR_STOP_RE.test(ln)) break;
    out.push(ln);
    j++;
  }
  return out;
}

async function parsePurchaseOrder(arrayBuffer, fileName) {
  const doc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const allLines = [];
  let p1 = null;
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const res = await pageLines(page);
    if (p === 1) p1 = { page, ...res };
    for (const ln of res.lines) allLines.push(ln);
  }
  const lines = allLines.map((l) => l.text);
  const raw = lines.join("\n");

  const data = { poNumber: null, currency: "EUR", total: null,
                 deliverTo: [], items: [], source: fileName };

  // ---- PO number: label glyphs are vertically offset from the number,
  // ---- so match by word coordinates on page 1.
  {
    let labelY = null;
    const words = [];
    for (const ln of p1.lines) for (const w of ln.words) words.push(w);
    for (const w of words) if (w.text.includes("покупка")) { labelY = w.y; break; }
    if (labelY !== null) {
      for (const w of words) {
        if (/^\d{6,10}$/.test(w.text) && Math.abs(w.y - labelY) < 10) {
          data.poNumber = w.text; break;
        }
      }
    }
    if (!data.poNumber) { // any standalone 6-10 digit number near the top
      for (const w of words) {
        if (/^\d{6,10}$/.test(w.text) && (p1.height - w.y) < 130) {
          data.poNumber = w.text; break;
        }
      }
    }
    if (!data.poNumber) {
      const m = raw.match(/Номер на поръчка за покупка:\s*(\d+)/);
      if (m) data.poNumber = m[1];
    }
  }

  // ---- currency + total
  {
    const m = raw.match(TOTAL_RE);
    if (m) { data.currency = m[1]; data.total = m[2]; }
    else {
      const c = raw.match(/Валута[\s_]*([A-Z](?:_*[A-Z]){2})/);
      if (c) data.currency = c[1].replace(/_/g, "");
    }
  }

  // ---- deliver-to address: page-1 header is two-column, so read the
  // ---- left column first; fall back to the flat text stream.
  {
    const leftRes = await pageLines(p1.page, 0.52);
    const leftLines = leftRes.lines.map((l) => l.text);
    const sources = [
      ["Адрес на доставка:", leftLines],
      ["Доставка до:", leftLines],
      ["Доставка до:", lines],
      ["адрес на фактура:", lines],
    ];
    outer:
    for (const [label, src] of sources) {
      for (let i = 0; i < src.length; i++) {
        if (src[i].trim() === label) {
          const addr = extractAddress(src, i);
          if (addr.length) { data.deliverTo = addr; break outer; }
        }
      }
    }
  }

  // ---- items
  let item = null, inDesc = false;
  const seen = new Set();
  for (const lnRaw of lines) {
    const s = lnRaw.trim();
    if (!s) continue;
    const m = s.match(ITEM_START_RE);
    if (m && m[1].startsWith("0")) {
      if (seen.has(m[1])) { item = null; inDesc = false; continue; } // page echo
      seen.add(m[1]);
      item = { pos: m[1], qty: m[2], unit: m[3], desc: [],
               material: "", price: "", net: "", contracts: [] };
      const first = m[4].trim();
      if (first) item.desc.push(first);
      data.items.push(item);
      inDesc = true;
      continue;
    }
    if (!item) continue;
    if (TOTAL_RE.test(s)) { item = null; inDesc = false; continue; }
    if (inDesc) {
      const pm = s.match(PRICE_LINE_RE);
      if (pm) {
        const lead = pm[1].trim();
        if (lead) item.material = lead;
        item.price = pm[2] + " / " + pm[3];
        item.net = pm[4];
        inDesc = false;
        continue;
      }
      if (isJunk(s)) continue;
      item.desc.push(s);
    } else {
      const cm = s.match(CONTRACT_RE);
      if (cm) item.contracts.push(cm[1]);
      // everything else after the price line (Plant:, Ваш номер...,
      // Доставка до: blocks, boilerplate) is intentionally ignored
    }
  }

  if (!data.poNumber) throw new Error("Could not find purchase-order number");
  if (!data.items.length) throw new Error("No order items found");
  return data;
}

/* ============================================================
   Rendering (port of the tested reportlab renderer)
   ============================================================ */
const PAGE_W = 595.28, PAGE_H = 841.89;

let fontsCache = null;

async function renderConfirmation(data) {
  const { PDFDocument, rgb, PDFName, PDFString } = PDFLib;
  const pdf = await PDFDocument.create();
  pdf.registerFontkit(fontkit);
  pdf.setTitle("Order confirmation " + data.poNumber);

  const sans  = await pdf.embedFont(b64ToBytes(FONT_B64.sans),  { subset: true });
  const sansB = await pdf.embedFont(b64ToBytes(FONT_B64.sansB), { subset: true });
  const sansI = await pdf.embedFont(b64ToBytes(FONT_B64.sansI), { subset: true });
  const mono  = await pdf.embedFont(b64ToBytes(FONT_B64.mono),  { subset: true });
  const monoB = await pdf.embedFont(b64ToBytes(FONT_B64.monoB), { subset: true });

  const page = pdf.addPage([PAGE_W, PAGE_H]);
  const top = (y) => PAGE_H - y;
  const black = rgb(0, 0, 0);

  const text = (x, y, s, font, size, color) =>
    page.drawText(s, { x, y: top(y), size, font, color: color || black });
  const textRight = (xR, y, s, font, size, color) =>
    text(xR - font.widthOfTextAtSize(s, size), y, s, font, size, color);

  // ---- letterhead banner
  const banner = await pdf.embedPng(b64ToBytes(BANNER_PNG_B64));
  const bw = 554.0, bh = 66.6;
  page.drawImage(banner, { x: 26.5, y: top(8.5) - bh, width: bw, height: bh });

  // ---- From / Deliver To
  const LX = 83.4, RX = 307.0;
  text(LX, 118.6, "From:", sans, 12);
  let y = 145.2;
  for (const ln of FROM_BLOCK) { text(LX, y, ln, sans, 10); y += 12.2; }
  text(LX, 182.1, "supplier number:  " + SUPPLIER_NUMBER, sans, 12);

  text(RX, 118.6, "Deliver To:", sans, 12);
  y = 143.9;
  for (const ln of data.deliverTo.slice(0, 6)) { text(RX, y, ln, sans, 10); y += 11.5; }

  // ---- confirmation line
  y = 227.3;
  const prefix = "We would like to confirm your purchase order: ";
  text(78.0, y, prefix, sans, 12);
  text(78.0 + sans.widthOfTextAtSize(prefix, 12), y, data.poNumber, sansB, 12);

  // ---- item table
  const TBL_L = 77.0, TBL_R = 525.0;
  const X_POS = TBL_L, X_QTY_R = 175.0, X_UNIT = 183.0, X_DESC = 215.0;
  const X_PRICE_R = 445.0, X_NET_R = TBL_R;

  y = 262.0;
  textRight(TBL_R, y, "Валута " + data.currency, monoB, 8.5);
  y += 8.0;

  const dashedRule = (yy) => page.drawLine({
    start: { x: TBL_L, y: top(yy) }, end: { x: TBL_R, y: top(yy) },
    thickness: 0.7, dashArray: [2.2, 1.6], color: black,
  });

  dashedRule(y); y += 9.5;
  text(X_POS, y, "Позиция", monoB, 8.5);
  text(120.0, y, "Поръчано", monoB, 8.5);
  text(X_DESC, y, "Описание", monoB, 8.5);
  textRight(X_PRICE_R, y, "Цена за брой", monoB, 8.5);
  textRight(X_NET_R, y, "Нетна стойност", monoB, 8.5);
  y += 10.0;
  text(114.0, y, "количество", monoB, 8.5);
  text(X_DESC, y, "Материал", monoB, 8.5);
  y += 5.5;
  dashedRule(y);
  y += 22.0;

  const lineH = 12.0;
  for (const it of data.items) {
    const yItem = y;
    text(X_POS, y, it.pos, sansB, 9);
    textRight(X_QTY_R, y, it.qty, sansB, 9);
    text(X_UNIT, y, it.unit, sansB, 9);
    for (const d of it.desc) { text(X_DESC, y, d, sansB, 9); y += lineH; }
    if (it.material) {
      const mw = sans.widthOfTextAtSize(it.material, 9);
      page.drawRectangle({ x: X_DESC - 1, y: top(y) - 2, width: mw + 2,
                           height: 10.5, color: HILITE_COLOR });
      text(X_DESC, y, it.material, sans, 9);
    }
    const priceY = it.material ? y : Math.max(yItem, y - lineH);
    if (it.price) textRight(X_PRICE_R, priceY, it.price, sansB, 9);
    if (it.net) textRight(X_NET_R, priceY, it.net, sansB, 9);
    if (it.material || it.price) y += lineH;
    for (const c of it.contracts) { text(130.0, y, c, sans, 9); y += lineH; }
    y += 14.0; // gap between items
  }

  // ---- total
  y += 10.0;
  text(155.0, y, "Обща нетна сума без данък " + data.currency, sans, 11);
  if (data.total) textRight(X_NET_R, y, data.total, sans, 11);
  y += 6.0;
  const eqW = mono.widthOfTextAtSize("=", 8.5);
  const nEq = Math.max(10, Math.floor((X_NET_R - 155.0) / eqW));
  text(155.0, y + 4, "=".repeat(nEq), mono, 8.5);

  // ---- signature footer
  let sy = 449.9;
  if (y > 430.0) sy = y + 40.0; // long orders: push footer below the table
  text(77.3, sy, SIGNATURE.name, sansI, 10);
  text(77.3, sy + 16.1, SIGNATURE.title, sansI, 10);
  let yy = sy + 32.2, x = 77.3;
  text(x, yy, SIGNATURE.companyBold, sansB, 10);
  x += sansB.widthOfTextAtSize(SIGNATURE.companyBold, 10);
  text(x, yy, SIGNATURE.companyRest, sans, 10);
  yy = sy + 48.3;
  text(77.3, yy, SIGNATURE.lineTF, sans, 10);
  yy = sy + 64.2;
  text(77.3, yy, SIGNATURE.lineM, sans, 10);
  x = 77.3 + sans.widthOfTextAtSize(SIGNATURE.lineM, 10);

  const links = [];
  const underlineLink = (xx, s, url) => {
    text(xx, yy, s, sans, 10, LINK_COLOR);
    const w = sans.widthOfTextAtSize(s, 10);
    page.drawLine({ start: { x: xx, y: top(yy) - 1.5 },
                    end: { x: xx + w, y: top(yy) - 1.5 },
                    thickness: 0.6, color: LINK_COLOR });
    links.push({ rect: [xx, top(yy) - 2, xx + w, top(yy) + 9], url });
    return w;
  };
  if (SIGNATURE.email) {
    x += underlineLink(x, SIGNATURE.email, "mailto:" + SIGNATURE.email);
  }
  if (SIGNATURE.url) {
    text(x, yy, " | ", sans, 10);
    x += sans.widthOfTextAtSize(" | ", 10);
    underlineLink(x, SIGNATURE.url, SIGNATURE.url);
  }

  // clickable link annotations
  const annots = links.map((l) => pdf.context.register(pdf.context.obj({
    Type: "Annot", Subtype: "Link", Rect: l.rect, Border: [0, 0, 0],
    A: { Type: "Action", S: "URI", URI: PDFString.of(l.url) },
  })));
  page.node.set(PDFName.of("Annots"), pdf.context.obj(annots));

  return pdf.save();
}

/* ============================================================
   UI wiring
   ============================================================ */
const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");
const rowsEl = document.getElementById("rows");
const tableWrap = document.getElementById("tableWrap");
const btnAll = document.getElementById("btnAll");
const btnClear = document.getElementById("btnClear");

const results = []; // { name, ok, outName, blob }

drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("hover"); });
drop.addEventListener("dragleave", () => drop.classList.remove("hover"));
drop.addEventListener("drop", (e) => {
  e.preventDefault(); drop.classList.remove("hover");
  handleFiles([...e.dataTransfer.files].filter((f) => /\.pdf$/i.test(f.name)));
});
fileInput.addEventListener("change", () => {
  handleFiles([...fileInput.files]);
  fileInput.value = "";
});

btnClear.addEventListener("click", () => {
  results.length = 0;
  rowsEl.innerHTML =
    '<tr class="empty"><td colspan="3">No files yet &mdash; finished PDFs will appear here.</td></tr>';
  btnAll.disabled = btnClear.disabled = true;
});

btnAll.addEventListener("click", async () => {
  for (const r of results) {
    if (r.ok) { triggerDownload(r.blob, r.outName); await new Promise((s) => setTimeout(s, 350)); }
  }
});

function triggerDownload(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);
}

function addRow(name) {
  const ph = rowsEl.querySelector("tr.empty");
  if (ph) ph.remove();
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${name.replace(/</g, "&lt;")}</td>
                  <td class="status-wait">Processing…</td><td></td>`;
  rowsEl.appendChild(tr);
  return tr;
}

async function handleFiles(files) {
  if (!files.length) return;
  btnClear.disabled = false;
  for (const f of files) {
    const tr = addRow(f.name);
    const stTd = tr.children[1], resTd = tr.children[2];
    try {
      const buf = await f.arrayBuffer();
      const data = await parsePurchaseOrder(buf, f.name);
      const bytes = await renderConfirmation(data);
      const outName = `Orders_Confirmation_${data.poNumber}.pdf`;
      const blob = new Blob([bytes], { type: "application/pdf" });
      results.push({ name: f.name, ok: true, outName, blob });
      stTd.textContent = "OK";
      stTd.className = "status-ok";
      const btn = document.createElement("button");
      btn.className = "dl";
      btn.textContent = "Download " + outName;
      btn.onclick = () => triggerDownload(blob, outName);
      resTd.appendChild(btn);
      triggerDownload(blob, outName); // auto-download when ready
      btnAll.disabled = false;
    } catch (err) {
      console.error(err);
      results.push({ name: f.name, ok: false });
      stTd.textContent = "FAILED";
      stTd.className = "status-err";
      resTd.textContent = err.message || String(err);
    }
  }
}
