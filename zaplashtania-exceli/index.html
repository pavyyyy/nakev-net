<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zaplashtania Exceli</title>
    <script src="../assets/theme.js"></script>
    <link rel="stylesheet" href="../assets/site.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="app-title">
          <h1>Zaplashtania Exceli</h1>
          <p>Batch Excel converter.</p>
        </div>
        <div class="row">
          <label class="theme-control">
            <input type="checkbox" data-theme-toggle />
            <span>Dark</span>
          </label>
          <a class="home-link" href="../">Home</a>
        </div>
      </header>

      <section class="panel stack">
        <label class="dropzone" id="dropzone">
          <input id="fileInput" type="file" accept=".xls,.xlsx" multiple />
          <span>
            <span class="drop-title">Select Excel files</span>
            <span class="drop-copy">Outputs converted files plus `401_404.xlsx` and `411_414.xlsx` when matching groups exist.</span>
          </span>
        </label>
        <div class="row">
          <button class="primary" id="runButton" type="button" disabled>Generate</button>
          <button id="clearButton" type="button" disabled>Clear</button>
        </div>
        <div class="status" id="status">Ready.</div>
        <div class="table-wrap" id="previewWrap" hidden>
          <table>
            <thead><tr><th>File</th><th>Group</th><th>Rows</th></tr></thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../assets/vendor/xlsx.full.min.js"></script>
    <script src="../assets/vendor/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
